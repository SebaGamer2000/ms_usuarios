spring.application.name=usuario
server.port = 8081


spring.datasource.url=jdbc:mysql://localhost:3306/usuarios_bd
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true


logging.level.root=INFO
logging.level.com.Usuario=DEBUG

logging.file.name=logs/usuarios.log

springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.cors-enabled=true

springdoc.hateoas.enabled=false
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocHateoasConfiguration

jwt.secret=gimnasio-sistema-microservicios-clave-secreta-2026
jwt.expiration=86400000

spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}
