spring.application.name=usuario
server.port = 8081

# Crea la BD vacía en phpMyAdmin antes de arrancar.
# Hibernate generará las tablas desde las entidades.
spring.datasource.url=jdbc:mysql://localhost:3306/usuarios_bd
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#update: crea las tablas si no existen, las actualiza
#si el modelo cambió. Esto es ideal para desarrollo local
#Y así entender lo que ocurre internamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

#Loggings para mostrar mensajes en la terminal
logging.level.root=INFO
logging.level.com.Usuario=DEBUG

logging.file.name=logs/usuarios.log

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.hateoas.enabled=false
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocHateoasConfiguration

jwt.secret=gimnasio-sistema-microservicios-clave-secreta-2026
jwt.expiration=86400000
